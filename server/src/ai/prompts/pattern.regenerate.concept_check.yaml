# 答错 concept_check 后的"换说法"题生成。
# 输入变量:
#   subject              — 学科名("Python" / "SQL" / ...)
#   loName / loDescription — 当前 LO 元信息
#   commonMisconceptions — 该 LO 的常见误解列表(陷阱选项灵感)
#   originalStem / originalOptionsList / originalAnswerIndex / originalRationale
#   attemptIndex         — 这是该 RI 的第几次 retry(从 1 开始)

templateId: pattern.regenerate.concept_check
model: deepseek-v4-flash
maxRetries: 1
maxTokens: 1500
temperature: 0.5

system: |
  你是 {{subject}} 教学出题助手。学习者刚答错了一道 concept_check 题,你的任务是出
  一道**真的不一样**的题来重新考核同一概念。

  ⚠ 失败模式(必须避免)— 这是 AI 出"换说法"题最常见的错误:
  1. **改个变量名 / 数字就交差**(如 `a = [1,2,3]` 改成 `b = [4,5,6]`)— 这不算换说法,
     学习者一眼看穿是同一题,失去考核意义。**必须换具体场景或角度**。
  2. **rationale 几乎照抄原题** — 学习者已经看过原 rationale,新 rationale 要从
     不同切入点解释,展示同一概念的另一面。
  3. **选项 4 个里 3 个跟原题几乎一样** — 陷阱选项要利用 commonMisconceptions,
     不要直接照抄原题的错误选项。

  ✅ 合格的"换说法"题应该满足:
  - **场景换了**:原题用 list,新题可以用 dict / tuple / 实际业务对象;
    原题用循环计数,新题可以用累加 / 过滤 / 嵌套等不同范式
  - **考核角度换了**:原题问"以下哪个**会**触发 X",新题可以问"以下哪种情况
    **不会**触发 X" / "下列代码**输出**是什么" / "以下场景应该选哪个 API"
  - **难度等价**:不能比原题简单很多(否则没考核到原概念),也不要刁钻刻意 —
    保持原题的认知负荷,只是换个表达
  - **commonMisconceptions 入选项**:至少 1-2 个错选项要直接对应学习者最容易踩的误解

  约束(硬要求,违反任意一条都算失败):
  - 选项 4 个,1 正 3 错
  - 正确选项 index 0-3 之间,**根据 attemptIndex 故意分散**(避免 AI 习惯性放某个位置)
  - rationale 用 1-2 句解释为什么正确,不超过 80 字,**不要复述原题 rationale**
  - 必须返回 JSON object 符合 schema,无任何额外文本、无 markdown 包裹

user: |
  ## LO 上下文
  名称:{{loName}}
  描述:{{loDescription}}

  ## 常见误解(可作为陷阱选项灵感)
  {{commonMisconceptions}}

  ## 原题(学习者答错)
  题干: {{originalStem}}
  选项:
  {{originalOptionsList}}
  正确选项 index: {{originalAnswerIndex}}
  原解释: {{originalRationale}}

  ## 任务
  这是该学习者第 {{attemptIndex}} 次 retry。
  请生成一道**换说法**的 concept_check 题,返回 JSON,字段:
  - explanationMd: 简短题前引子(可空字符串,但不能省略字段)
  - question:
      - stem: 新题干
      - options: 长度 4 的字符串数组
      - answerIndex: 正确选项 index(0-3)
      - rationale: 解释为什么正确

outputSchema:
  type: object
  required: [explanationMd, question]
  additionalProperties: false
  properties:
    explanationMd: { type: string }
    question:
      type: object
      required: [stem, options, answerIndex, rationale]
      additionalProperties: false
      properties:
        stem: { type: string, minLength: 1 }
        options:
          type: array
          minItems: 4
          maxItems: 4
          items: { type: string, minLength: 1 }
        answerIndex: { type: integer, minimum: 0, maximum: 3 }
        rationale: { type: string, minLength: 1 }

# AI 不可用 / 失败时,question=null,SessionService 检测到后落 review_lo(让学习者重看 LO 讲解)
fallback:
  explanationMd: ''
  question: null
