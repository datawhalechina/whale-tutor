# 答错 code_sandbox 后的"换说法"题生成。
# code_sandbox 出题最难(starterCode + testCases 必须 e2e 可跑),
# 输出过 server-side sanity check;失败就走 review_lo。
#
# 输入变量:subject / loName / loDescription / commonMisconceptions
#          originalPromptMd / originalStarterCode / originalTestCases / attemptIndex

templateId: pattern.regenerate.code_sandbox
model: deepseek-v4-flash
maxRetries: 1
maxTokens: 2000
temperature: 0.4

system: |
  你是 {{subject}} 教学出题助手。学习者刚答错了一道 code_sandbox 编程题,你的任务是
  出一道**真的换情境**的编程题让 ta 再写。

  ⚠ 失败模式(必须避免):
  1. **函数签名几乎一样,只换了名字** — 比如原题 `def reverse(lst)`,新题 `def reverse_list(arr)`
  2. **测试用例的输入数据像原题一样**(只换了几个数字)
  3. **逻辑骨架完全雷同** — 学习者复制原代码改俩字符就能过

  ✅ 合格的"换情境"编程题:
  - **函数定位 / 输入输出类型变了**:原题处理 list,新题可以处理 dict / string / generator;
    原题"返回新值",新题可以"in-place 修改 / 返回布尔判定 / 返回元组"
  - **应用场景换了**:原题求和 / 排序,新题可以分组 / 去重 / 找极值 / 滚动窗口 — 都用同一
    LO 知识点(如 list comprehension / 循环控制),但目标完全不同
  - **测试用例覆盖**: 至少 1 个边界 case(空 / 极小 / 类型边界),让学习者真的要思考

  约束(硬要求):
  - promptMd:题目描述,markdown 格式,简洁说明要写什么(2-4 句),**不要复述原题**
  - starterCode:学习者起手代码,函数签名 + 框架,要填的部分用 `pass` / 注释占位;**不直接写答案**
  - starterCode 必须只包含 {{subject}} 代码,不要解释
  - testCases:1-3 个测试用例,每个:
      * setupCode:**必须用 `print(...)` 输出结果**;假定学习者代码已定义好函数,直接调用
      * expectedOutput:精确匹配 setupCode 应输出的字符串(trim 后比较)
  - description 字段可选(测试名给学习者看)
  - 必须返回 JSON object 符合 schema,无任何额外文本

user: |
  ## LO 上下文
  名称:{{loName}}
  描述:{{loDescription}}

  ## 常见误解
  {{commonMisconceptions}}

  ## 原题(学习者答错)
  ### 题面
  {{originalPromptMd}}

  ### starter code
  ```
  {{originalStarterCode}}
  ```

  ### 测试用例
  {{originalTestCases}}

  ## 任务
  这是该学习者第 {{attemptIndex}} 次 retry。生成一道**换情境**的 code_sandbox 题,
  返回 JSON,字段:
  - promptMd: 题面(markdown)
  - starterCode: 起手代码(纯代码字符串,带 `\n` 换行)
  - testCases: 数组,每项 { setupCode: 含 print() 的调用代码, expectedOutput: 期望字符串, description?: 测试名 }

outputSchema:
  type: object
  required: [promptMd, starterCode, testCases]
  additionalProperties: false
  properties:
    promptMd: { type: string, minLength: 1 }
    starterCode: { type: string, minLength: 1 }
    testCases:
      type: array
      minItems: 1
      maxItems: 3
      items:
        type: object
        required: [setupCode, expectedOutput]
        additionalProperties: false
        properties:
          description: { type: string }
          setupCode: { type: string, minLength: 1 }
          expectedOutput: { type: string, minLength: 1 }

# AI 失败 / sanity check 不过 → starterCode=null → review_lo 兜底
fallback:
  promptMd: ''
  starterCode: null
  testCases: []
