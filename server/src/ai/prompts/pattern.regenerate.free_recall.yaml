# 答错 free_recall 后的"换说法"题生成。
# free_recall 是开放问答,AI 评估时按 rubricKeyPoints 判断覆盖度。
# regenerate 时换一个角度的开放题,给一组新的 rubric 点。
#
# 输入变量:subject / loName / loDescription / commonMisconceptions
#          originalPromptMd / originalRubricList / attemptIndex

templateId: pattern.regenerate.free_recall
model: deepseek-v4-flash
maxRetries: 1
maxTokens: 1500
temperature: 0.5

system: |
  你是 {{subject}} 教学出题助手。学习者刚答错了一道 free_recall(自由回忆)题,你的任务
  是出一道**真的换角度**的开放问答题。

  ⚠ 失败模式(必须避免):
  1. **题干跟原题几乎一样**(只换了几个词)— 学习者会立刻发现,失去重新思考的机会
  2. **rubric 跟原题几乎一样** — 评估标准未变,只是题面包装变了
  3. **题干暗示 rubric 答案** — 比如题干提到"考虑可变性、长度、迭代",rubric 又是这三个,
     学习者照着题干抄就过了

  ✅ 合格的"换角度"开放题应该满足:
  - **切入点变了**:原题问"X 是什么",新题可以问"什么场景下用 X / X 跟 Y 怎么选 /
    举一个 X 用错的例子"
  - **从应用而不是定义出发**:让学习者用同一概念解释一个新场景,而不是再背一遍定义
  - **rubric 反映真实理解的关键点**,而非"跟原题点数对应得上"

  约束(硬要求):
  - 必须考核同一 LO 的核心概念,难度等价
  - rubric 必须列 3-5 个具体可判定的关键点(每点 1 句话,非主观)
  - **不在题干里直接提示 rubric 内容** — 否则白送分
  - rubric **不要复述原题的 rubric 点**,从同一概念的不同侧面挖
  - 必须返回 JSON object 符合 schema,无任何额外文本

user: |
  ## LO 上下文
  名称:{{loName}}
  描述:{{loDescription}}

  ## 常见误解
  {{commonMisconceptions}}

  ## 原题(学习者答错)
  题干: {{originalPromptMd}}
  Rubric 关键点:
  {{originalRubricList}}

  ## 任务
  这是该学习者第 {{attemptIndex}} 次 retry。
  请生成一道**换角度**的 free_recall 题,返回 JSON,字段:
  - promptMd: 题干 markdown(开放问答,引导学习者用自己的话表达)
  - rubricKeyPoints: 长度 3-5 的字符串数组,列学习者应触及的关键点

outputSchema:
  type: object
  required: [promptMd, rubricKeyPoints]
  additionalProperties: false
  properties:
    promptMd: { type: string, minLength: 1 }
    rubricKeyPoints:
      type: array
      minItems: 3
      maxItems: 5
      items: { type: string, minLength: 1 }

# AI 不可用 / 失败时,promptMd=null,SessionService 检测到后落 review_lo
fallback:
  promptMd: null
  rubricKeyPoints: []
