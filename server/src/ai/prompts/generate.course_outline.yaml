# `whale-tutor generate` 阶段 1:从课程名 + 主题 + 期望章节数,生成课程大纲。
#
# 输入:
#   courseName        — 用户给的课程名(中文 OK)
#   topic             — 用户描述的主题/范围(可空,空则从 courseName 推)
#   audience          — 目标受众描述(可空)
#   chapterCountHint  — 期望章节数;字符串,可能是 "auto" 或具体数字
#
# 输出:课程顶层 yaml + 每章 outline。这一步**不写章节正文**,
# 只决定结构(课程多少章 + 每章讲什么)。后续 generate.chapter_content
# 会按这个 outline 一章一章扩写正文。
#
# 设计要点(教学法):
#   - 章节数:用户给了就严格按那个;没给就根据主题广度选 3-7 章
#     (太少 LO 拆不开,太多每章太薄)
#   - 章节顺序必须教学法递进:先基础后进阶,前置概念在前
#   - 每个章节聚焦"一个独立认知单元",约 15-30 分钟体量
#   - chapter summary 要具体可考核 — "学完此章能做到 X / Y / Z",不能"了解 X" 这种空话
#     (它是给阶段 2 当 prompt 用的,模糊会拖累后续质量)

templateId: generate.course_outline
model: deepseek-v4-flash
maxRetries: 2
maxTokens: 3500
temperature: 0.4

system: |
  你是课程结构设计专家。给你课程名 / 主题 / 期望章节数 / 目标受众,
  返回一个**结构化课程大纲**:课程顶层信息 + N 章 outline(只写章节计划,不写正文)。

  关键准则:
  1. **章节顺序教学法递进**:基础在前 / 进阶在后;前置概念先讲清楚后才能引用
  2. **每章一个认知单元**,15-30 分钟学习体量(后续阶段 2 会扩成 2000-3500 字讲稿;
     阶段 3 build 会从中拆 3-5 个 LO 出来,所以章节本身不能太碎也不能太杂)
  3. **chapter summary 必须具体可考核**:写"学完此章学习者**能做到**A、B、C"格式,
     不要写"了解 X" / "认识 Y" 这种空话(空话会拖累阶段 2 的内容生成质量)
  4. **章节数判定**:
     - 如果 chapterCountHint 是具体数字(如 "5"),严格按那个数
     - 如果是 "auto",根据主题广度选:
       * 单点深入(一个特性)→ 3-4 章
       * 中等广度(一个领域)→ 4-6 章
       * 大覆盖(整个学科入门)→ 6-8 章
  5. **id / slug 规范**:
     - courseId: kebab-case 全小写 ASCII(只字母数字连字符,2-30 字符,跟课程名相关且直观)
     - chapter slug: 蛇形小写 ASCII(只字母数字下划线,2-25 字符,代表该章主题)
  6. **subject**:必须是**单个学科名词**(首字母大写),如 Python / SQL / Pandas / Java / Statistics,
     不要写"Python 编程入门" 这种短语
  7. **description**:课程简介,2-4 句话,给学习者看(说清这门课讲什么 + 学完能做到什么)
  8. 必须返回 JSON 符合 schema,无任何额外文本、无 markdown 包裹

user: |
  ## 用户输入
  课程名:{{courseName}}
  主题/范围:{{topic}}
  目标受众:{{audience}}
  期望章节数:{{chapterCountHint}}

  ## 任务
  设计课程大纲,返回 JSON:
  - courseId: 课程标识(kebab-case)
  - subject: 学科名词(单词,首字母大写)
  - description: 课程简介(2-4 句话,从用户输入提炼,可适当补充)
  - chapters: 章节数组(顺序就是学习顺序),每项含:
    - slug: 蛇形小写
    - name: 中文标题
    - summary: 该章具体目标 — "学完此章能做到 X / Y / Z" 格式,3-5 句

outputSchema:
  type: object
  required: [courseId, subject, description, chapters]
  additionalProperties: false
  properties:
    courseId:
      type: string
      pattern: '^[a-z0-9][a-z0-9-]{1,29}$'
    subject:
      type: string
      pattern: '^[A-Z][A-Za-z0-9+#.]{0,30}$'
    description:
      type: string
      minLength: 20
      maxLength: 600
    chapters:
      type: array
      minItems: 2
      maxItems: 10
      items:
        type: object
        required: [slug, name, summary]
        additionalProperties: false
        properties:
          slug:
            type: string
            pattern: '^[a-z0-9](?:_?[a-z0-9])*$'
            minLength: 2
            maxLength: 25
          name:
            type: string
            minLength: 1
            maxLength: 80
          summary:
            type: string
            minLength: 30
            maxLength: 400

# AI 失败 / 无 key 时返回空大纲,GenerateService 检测到后报错退出
fallback:
  courseId: '_FALLBACK_'
  subject: '_FALLBACK_'
  description: '_FALLBACK_'
  chapters: []
