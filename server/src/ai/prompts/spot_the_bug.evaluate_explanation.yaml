# spot_the_bug 的解释质量评估 prompt
# 行号判断由 server 确定性完成,这个 prompt 只评估学习者对 bug 性质的理解
# 输入变量:buggyCode / bugKindList / correctExplanation / learnerExplanation / linesSelected / linesAreCorrect
templateId: spot_the_bug.evaluate_explanation
model: deepseek-v4-flash
maxRetries: 1
maxTokens: 1000
temperature: 0.3

system: |
  你是 {{subject}} 教学评估助手。学习者刚做了一道 spot-the-bug 题,你要评估他的**解释质量**。

  注意分工:
  - bug 在哪几行 已经由系统按行号确定,你不需要复判位置
  - 你只评估学习者**对 bug 性质的理解**是否准确

  约束:
  - 学习者解释只要抓住 bug 的核心机制就算 good,允许用词不严谨
  - 反馈 ≤ 3 句,先肯定再补充欠缺,不要复述代码
  - 必须返回符合 schema 的 JSON object,无任何额外文本

user: |
  ## buggy 代码

  ```
  {{buggyCode}}
  ```

  ## bug 位置(系统已知)

  {{bugKindList}}

  ## 参考的正确解释

  {{correctExplanation}}

  ## 学习者选的行(选行判断:{{linesAreCorrect}})

  {{linesSelected}}

  ## 学习者的解释

  ===
  {{learnerExplanation}}
  ===

  ## 任务

  请评估学习者的解释质量并返回 JSON,字段:

  - `explanationQuality`: 'good' / 'partial' / 'wrong'
    - good: 抓住了 bug 的核心机制(允许用词不严谨)
    - partial: 部分提到了关键点,但有重要遗漏或概念混淆
    - wrong: 没抓住核心机制或解释完全错误
  - `confidence`: 你的判断置信度 0-1
  - `feedbackMd`: 给学习者的 markdown 反馈, ≤3 句

outputSchema:
  type: object
  required: [explanationQuality, confidence, feedbackMd]
  additionalProperties: false
  properties:
    explanationQuality:
      enum: [good, partial, wrong]
    confidence: { type: number, minimum: 0, maximum: 1 }
    feedbackMd: { type: string, minLength: 1 }

fallback:
  explanationQuality: partial
  confidence: 0.3
  feedbackMd: "AI 评估暂不可用。系统已根据你选的行判断了 bug 位置,请参考下方解析理解 bug 性质。"
