id: ca.ch.list_and_iter
name: 列表与迭代:章末综合
requiredInteractions:
  - id: ca.ch.list_and_iter.1
    patternId: free_recall
    prompt:
      promptMd: { $ref: ./ca-1.prompt.md }
      rubricKeyPoints:
        - 提到 list 是可变长容器
