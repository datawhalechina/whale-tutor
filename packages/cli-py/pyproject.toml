[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "whale-tutor"
version = "0.1.0"
description = "AI-driven interactive Python tutor — content authoring CLI"
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "Whale Tutor Contributors" },
]
license = { text = "MIT" }
keywords = ["education", "tutoring", "ai", "python", "interactive-learning"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Education",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Education",
]
dependencies = [
  "click>=8.1",
  "pyyaml>=6.0",
  "mysql-connector-python>=8.0",
  "rich>=13.0",
]

[project.scripts]
whale-tutor = "whale_tutor.cli:main"

[project.urls]
Homepage = "https://github.com/datawhale/whale-tutor"
Repository = "https://github.com/datawhale/whale-tutor"

[tool.hatch.build.targets.wheel]
packages = ["whale_tutor"]

# 把 _bundle/ 内的 server/web/db/templates 资源也打入 wheel。
# build-cli-bundle.ts 在打包前会填充这个目录,Python 端 importlib.resources 读它。
[tool.hatch.build.targets.wheel.force-include]
"whale_tutor/_bundle" = "whale_tutor/_bundle"

[tool.hatch.build.targets.sdist]
include = [
  "whale_tutor/**/*.py",
  "whale_tutor/_bundle/**/*",
  "README.md",
  "pyproject.toml",
]
